[build]
builder = "nixpacks"
# Run with Root Directory = apps/web. NEXT_PUBLIC_API_URL must be set BEFORE
# build (Next.js inlines NEXT_PUBLIC_* at build time).
buildCommand = "pnpm install && pnpm build"

[deploy]
startCommand = "pnpm start"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
